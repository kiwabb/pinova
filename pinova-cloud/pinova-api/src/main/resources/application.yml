spring:
  application:
    name: pinova
  datasource:
    url: ${PINOVA_DB_URL:jdbc:postgresql://127.0.0.1:15432/pinova?currentSchema=pinova}
    username: ${PINOVA_DB_USERNAME:pinova}
    password: ${PINOVA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.pinova.pojo
  type-handlers-package: com.pinova.mapper.typehandler
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

pinova:
  payment:
    mock-enabled: ${PINOVA_PAYMENT_MOCK_ENABLED:false}
    expiration-scan-delay-ms: ${PINOVA_PAYMENT_EXPIRATION_SCAN_DELAY_MS:60000}
  storage:
    public-base-url: ${PINOVA_MEDIA_PUBLIC_BASE_URL:http://127.0.0.1:19000}
    bucket: ${PINOVA_MINIO_BUCKET:pinova-public}
